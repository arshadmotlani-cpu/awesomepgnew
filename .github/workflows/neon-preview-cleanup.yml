name: Neon preview branch cleanup

on:
  schedule:
    # Daily — prune stale Vercel/Neon preview DB branches before branch limit blocks deploys
    - cron: '15 5 * * *'
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (report branches without deleting)'
        required: false
        default: false
        type: boolean

concurrency:
  group: neon-preview-cleanup-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  preemptive-cleanup:
    # Free Neon branch slots before Vercel tries to provision a new preview DB branch
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Neon credentials
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Neon cleanup skipped::NEON_API_KEY (secret) and NEON_PROJECT_ID (variable) are not configured in GitHub repo settings. Vercel previews will keep failing with Branch limit reached until you delete stale branches in the Neon console OR add these credentials. See docs/NEON_BRANCH_SETUP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.neon.outputs.configured == 'true'
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.neon.outputs.configured == 'true'
        run: npm ci --include=dev

      - name: Free Neon branch slots (pre-deploy)
        if: steps.neon.outputs.configured == 'true'
        run: npx tsx scripts/cleanup-neon-preview-branches.ts --execute
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          NEON_BRANCH_RETENTION_DAYS: ${{ vars.NEON_BRANCH_RETENTION_DAYS || '3' }}
          NEON_BRANCH_HEADROOM: ${{ vars.NEON_BRANCH_HEADROOM || '3' }}
          NEON_MAX_BRANCHES: ${{ vars.NEON_MAX_BRANCHES || '10' }}

  cleanup-stale-branches:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Neon credentials
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error title=Neon credentials missing::Add NEON_API_KEY (secret) and NEON_PROJECT_ID (variable) in GitHub → Settings → Secrets and variables → Actions. See docs/NEON_BRANCH_SETUP.md"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cleanup stale Neon / Vercel preview branches
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/cleanup-neon-preview-branches.ts
          else
            npx tsx scripts/cleanup-neon-preview-branches.ts --execute
          fi
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          NEON_BRANCH_RETENTION_DAYS: ${{ vars.NEON_BRANCH_RETENTION_DAYS || '7' }}
          NEON_BRANCH_HEADROOM: ${{ vars.NEON_BRANCH_HEADROOM || '2' }}
          NEON_MAX_BRANCHES: ${{ vars.NEON_MAX_BRANCHES }}

  delete-pr-preview-branch:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Neon credentials
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping PR branch delete — NEON_API_KEY / NEON_PROJECT_ID not configured"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete Neon branch for closed PR
        if: steps.neon.outputs.configured == 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ github.head_ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
        continue-on-error: true
