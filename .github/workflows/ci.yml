name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Verify test tooling
        run: |
          set -euxo pipefail
          node -v
          npm -v
          test -x node_modules/.bin/tsx
          node_modules/.bin/tsx --version

      - name: Unit and integration tests
        run: |
          set -euxo pipefail
          node_modules/.bin/tsx scripts/lint-image-uploads.ts
          node_modules/.bin/tsx scripts/lint-private-blob-display.ts
          node --import tsx --test --test-concurrency=1 'tests/unit/**/*.test.ts' 'tests/integration/**/*.test.ts'

      - name: Production build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-auth-secret-min-32-chars-long
          SKIP_MIGRATION_GATE: '1'

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e
        env:
          CI: 'true'
          AUTH_SECRET: ci-build-auth-secret-min-32-chars-long
          SKIP_MIGRATION_GATE: '1'
